name: Deploy Atletas World

# ============================================================
# GitHub Secrets required:
#   SECRET_KEY       — Django secret key (production)
#   EC2_HOST         — EC2 elastic IP or domain
#   EC2_SSH_KEY      — Private key PEM content (the .pem file text)
#   EC2_USER         — SSH user (default: ubuntu)
#
# Optional secrets (for collectstatic to S3 during CI):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_STORAGE_BUCKET_NAME
# ============================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: 'True'
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
        run: |
          cd src
          python manage.py migrate --noinput
          python manage.py test --verbosity=2

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull latest code
        run: |
          cd /var/www/atletasworld
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          /var/www/atletasworld/venv/bin/pip install --quiet -r /var/www/atletasworld/requirements.txt

      - name: Run migrations
        run: |
          cd /var/www/atletasworld/src
          /var/www/atletasworld/venv/bin/python manage.py migrate --noinput

      - name: Collect static files
        run: |
          cd /var/www/atletasworld/src
          /var/www/atletasworld/venv/bin/python manage.py collectstatic --noinput

      - name: Restart application
        run: |
          sudo /usr/bin/supervisorctl restart atletasworld
          sudo /usr/bin/supervisorctl restart atletasworld-celery
          sudo /usr/bin/supervisorctl status

      - name: Deploy summary
        run: |
          echo "Deployed commit ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deployed at: $(date)"
