version: 2

updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch minor/patch updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Chicago"
    labels:
      - dependencies
