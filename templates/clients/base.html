<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon/favicon.ico">
    <link rel="stylesheet" href="/static/gymlife/css/bilgen.css?v=7">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon/apple-touch-icon.png">
    <meta charset="UTF-8">
    <script>(function(){if(localStorage.getItem("apc-dark")==="1")document.documentElement.classList.add("dark");})()</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Condensed:wght@300;400;700;800&display=swap">
    <title>{% block title %}Client Portal{% endblock %} - Atletas Performance Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a1a1a',
                        secondary: '#D7FF00',
                        accent: '#D7FF00',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Archivo Condensed', system-ui, sans-serif; font-weight: 400; }
        h1, .brand-heading { font-family: 'Bilgen', 'Archivo Condensed', system-ui, sans-serif; font-weight: 800; }
        h2 { font-family: 'Bilgen', 'Archivo Condensed', system-ui, sans-serif; font-weight: 700; }
        h3, h4, h5, h6 { font-family: 'Archivo Condensed', system-ui, sans-serif; font-weight: 700; }
        small, caption { font-weight: 300; }

        /* Dark mode */
        html.dark body{background-color:#0f172a!important;color:#e2e8f0!important}
        html.dark .bg-white{background-color:#1e293b!important}
        html.dark .bg-gray-50{background-color:#0f172a!important}
        html.dark .bg-gray-100{background-color:#1e293b!important}
        html.dark .bg-gray-200{background-color:#334155!important}
        html.dark .text-gray-800,html.dark .text-gray-700{color:#f1f5f9!important}
        html.dark .text-gray-600,html.dark .text-gray-500{color:#cbd5e1!important}
        html.dark .text-gray-200,html.dark .text-gray-300{color:#f1f5f9!important}
        html.dark .text-gray-400{color:#cbd5e1!important}
        html.dark .text-gray-900{color:#f8fafc!important}
        html.dark .border,html.dark .border-gray-200,html.dark .border-gray-100,html.dark .border-gray-300{border-color:#334155!important}
        html.dark .divide-gray-100>*+*,html.dark .border-b,html.dark .border-t{border-color:#334155!important}
        html.dark input:not([type=checkbox]):not([type=radio]),html.dark textarea,html.dark select{background-color:#0f172a!important;color:#f1f5f9!important;border-color:#475569!important}
        html.dark .hover\:bg-gray-50:hover{background-color:#263048!important}
        html.dark .bg-blue-50{background-color:#1e3a5f!important}html.dark .text-blue-800{color:#93c5fd!important}html.dark .border-blue-200{border-color:#1d4ed8!important}
        html.dark .text-blue-700{color:#93c5fd!important}html.dark .text-red-700{color:#fca5a5!important}html.dark .text-yellow-700{color:#fde68a!important}html.dark .text-orange-400{color:#fb923c!important}html.dark .text-green-500{color:#4ade80!important}
        html.dark .text-blue-600{color:#60a5fa!important}
        html.dark .bg-yellow-50{background-color:#3d2600!important}html.dark .text-yellow-800{color:#fde68a!important}html.dark .border-yellow-300{border-color:#92400e!important}html.dark .text-yellow-600{color:#fcd34d!important}
        html.dark .bg-green-50{background-color:#052e16!important}html.dark .text-green-800{color:#86efac!important}html.dark .text-green-600{color:#4ade80!important}html.dark .text-green-700{color:#4ade80!important}html.dark .border-green-200{border-color:#166534!important}
        html.dark .bg-red-50{background-color:#450a0a!important}html.dark .text-red-800{color:#fca5a5!important}html.dark .text-red-600{color:#f87171!important}html.dark .border-red-200{border-color:#7f1d1d!important}
        html.dark .bg-orange-50{background-color:#431407!important}html.dark .text-orange-600{color:#fb923c!important}html.dark .text-orange-700{color:#fb923c!important}
        html.dark .bg-indigo-50{background-color:#1e1b4b!important}html.dark .text-indigo-600{color:#a5b4fc!important}html.dark .border-indigo-200{border-color:#3730a3!important}html.dark .text-indigo-700{color:#a5b4fc!important}html.dark .text-indigo-800{color:#c7d2fe!important}
        html.dark .bg-purple-100{background-color:#3b0764!important}html.dark .text-purple-600{color:#c084fc!important}html.dark .text-purple-500{color:#c084fc!important}
        html.dark .shadow-md,html.dark .shadow-lg,html.dark .shadow-sm{box-shadow:0 4px 6px rgba(0,0,0,.5)!important}
        html.dark .bg-amber-50{background-color:#3d2600!important}html.dark .text-amber-800{color:#fde68a!important}html.dark .border-amber-300{border-color:#92400e!important}
        html.dark .bg-green-100{background-color:#14532d!important}
        html.dark .from-primary{--tw-gradient-from:#0f172a!important}html.dark .to-secondary{--tw-gradient-to:#334155!important}html.dark .text-orange-500{color:#fb923c!important}
        html.dark .text-primary{color:#e2e8f0!important}html.dark .bg-secondary.text-primary,html.dark .bg-secondary .text-primary,html.dark .bg-accent.text-primary,html.dark .bg-accent .text-primary{color:#1a1a1a!important}
        html.dark .bg-secondary.text-gray-900,html.dark .bg-secondary .text-gray-900,html.dark .bg-accent.text-gray-900,html.dark .bg-accent .text-gray-900,html.dark [class*="bg-\\[#D7FF00\\]"].text-gray-900,html.dark [class*="bg-\\[#b8e000\\]"].text-gray-900{color:#1a1a1a!important}html.dark .bg-secondary,html.dark .bg-accent{background-color:#D7FF00!important}html.dark .bg-red-100{background-color:#450a0a!important}html.dark .bg-yellow-100{background-color:#3d2600!important}html.dark .bg-blue-100{background-color:#1e3a5f!important}html.dark .bg-orange-100{background-color:#431407!important}html.dark .bg-indigo-100{background-color:#1e1b4b!important}html.dark .bg-gray-800{background-color:#0f172a!important}
        {% block extra_styles %}{% endblock %}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    {% include "includes/client_nav.html" %}

    {% block content %}{% endblock %}

    <script>
    (function(){
        var btn = document.getElementById('client-mobile-btn');
        if(btn) btn.addEventListener('click', function(){
            document.getElementById('client-mobile-menu').classList.toggle('hidden');
        });
    })();

    function toggleClientDark() {
        document.documentElement.classList.toggle('dark');
        var isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('apc-dark', isDark ? '1' : '0');
        var btn = document.getElementById('client-dark-btn');
        if (btn) btn.textContent = isDark ? '☀️' : '🌙';
    }

    // Initialize dark mode button on load
    (function(){
        var isDark = localStorage.getItem('apc-dark') === '1';
        var btn = document.getElementById('client-dark-btn');
        if (btn) btn.textContent = isDark ? '☀️' : '🌙';
    })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
