{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign In - Atletas Performance Center{% endblock %}

{% block body %}
<div class="min-vh-100 d-flex flex-column bg-light">
    <!-- Simple Nav -->
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/img/apc-logo-black.png" alt="Atletas Performance Center" height="40" class="rounded">
            </a>
            <a href="/" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-house me-1"></i> Home
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <!-- Logo/Header -->
                    <div class="text-center mb-4">
                        <img src="/static/img/apc-logo-black.png" alt="Atletas Performance Center" class="mb-3" style="height: 80px;">
                        <h1 class="h3 fw-bold text-dark">Welcome Back</h1>
                        <p class="text-muted">Sign in to your account</p>
                    </div>

                    <!-- Login Card -->
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <!-- Email Login Form -->
                            <form method="POST" action="{% url 'account_login' %}">
                                {% csrf_token %}
                                {{ form|crispy }}

                                <div class="text-end mb-3">
                                    <a href="{% url 'account_reset_password' %}" class="small text-decoration-none text-success">Forgot password?</a>
                                </div>

                                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                                </button>
                            </form>

                            <script>
                            (function() {
                                const pwd = document.getElementById('id_password');
                                if (pwd) {
                                    pwd.addEventListener('keydown', function(e) {
                                        if (e.key === 'Enter' || e.keyCode === 13) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            this.form.submit();
                                            return false;
                                        }
                                    });
                                }
                            })();
                            </script>
                        </div>
                    </div>

                    <!-- Sign Up Link -->
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">
                            Don't have an account?
                            <a href="{% url 'account_signup' %}" class="text-success fw-semibold text-decoration-none">Sign up</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock body %}
