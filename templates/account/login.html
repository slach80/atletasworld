{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign In - Atletas Performance Center{% endblock %}

{% block body %}
<style>
.auth-bg {
    background-color: #111111;
    background-image:
        radial-gradient(circle at 20% 50%, rgba(215,255,0,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(215,255,0,0.04) 0%, transparent 40%),
        repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 40px,
            rgba(255,255,255,0.015) 40px,
            rgba(255,255,255,0.015) 41px
        );
}
</style>
<div class="min-vh-100 d-flex flex-column auth-bg">
    <!-- Simple Nav -->
    <nav class="navbar navbar-dark shadow-sm" style="background-color: #0d0d0d; border-bottom: 1px solid rgba(215,255,0,0.15);">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/img/apc-logo-yellow.png" alt="Atletas Performance Center" height="40" class="rounded">
            </a>
            <a href="/" class="btn btn-sm fw-semibold" style="color:#D7FF00; border: 1px solid rgba(215,255,0,0.4);">
                ← Home
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <!-- Logo/Header -->
                    <div class="text-center mb-4">
                        <img src="/static/img/apc-logo-yellow.png" alt="Atletas Performance Center" class="mb-3" style="height: 72px;">
                        <h1 class="h3 fw-bold text-white mb-1">Welcome Back</h1>
                        <p class="text-light opacity-50 small mb-0">Sign in to your account</p>
                    </div>

                    <!-- Login Card -->
                    <div class="card border-0 shadow-lg rounded-4" style="background:#1e1e1e; border: 1px solid rgba(255,255,255,0.08) !important;">
                        <div class="card-body p-4">
                            <form method="POST" action="{% url 'account_login' %}">
                                {% csrf_token %}
                                {{ form|crispy }}

                                <button type="submit" class="btn w-100 py-2 fw-bold mt-1" style="background-color:#D7FF00;border-color:#D7FF00;color:#111;font-size:1rem;">
                                    Sign In →
                                </button>
                            </form>

                            <script>
                            (function() {
                                const pwd = document.getElementById('id_password');
                                if (pwd) {
                                    pwd.addEventListener('keydown', function(e) {
                                        if (e.key === 'Enter' || e.keyCode === 13) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            this.form.submit();
                                            return false;
                                        }
                                    });
                                }
                            })();
                            </script>
                        </div>
                    </div>

                    <!-- Sign Up Link -->
                    <div class="text-center mt-3">
                        <p class="text-light opacity-50 mb-0 small">
                            Don't have an account?
                            <a href="{% url 'account_signup' %}" class="fw-semibold text-decoration-none" style="color:#D7FF00;">Sign up</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock body %}
