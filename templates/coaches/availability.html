{% extends 'coaches/base.html' %}
{% block title %}Availability Calendar{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">
<style>
    #calendar { height: 680px; }
    .calendar-title { min-width: 200px; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-5">
        <h1 class="text-2xl font-bold text-gray-800">Availability Calendar</h1>
        <button onclick="openCreateSlotModal()"
                class="flex items-center gap-2 px-4 py-2 bg-secondary text-gray-900 rounded-lg font-semibold hover:bg-[#b8e000] transition text-sm">
            + Add Availability
        </button>
    </div>

    <!-- Calendar controls -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <div class="flex items-center justify-between flex-wrap gap-3">
            <div class="flex items-center gap-2">
                <button onclick="calendar.prev()" class="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm">‹</button>
                <button onclick="calendar.today()" class="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm font-medium">Today</button>
                <button onclick="calendar.next()" class="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm">›</button>
                <span id="calendar-title" class="calendar-title text-base font-semibold text-gray-800 ml-2"></span>
            </div>
            <div class="flex gap-1">
                <button onclick="changeView('day')" id="btn-day" class="view-btn px-3 py-1.5 border border-gray-300 rounded-l-lg hover:bg-gray-50 text-sm">Day</button>
                <button onclick="changeView('week')" id="btn-week" class="view-btn px-3 py-1.5 border-y border-gray-300 hover:bg-gray-50 text-sm bg-gray-100 font-semibold">Week</button>
                <button onclick="changeView('month')" id="btn-month" class="view-btn px-3 py-1.5 border border-gray-300 rounded-r-lg hover:bg-gray-50 text-sm">Month</button>
            </div>
        </div>
    </div>

    <!-- Session type legend -->
    <div id="session-types-legend" class="flex flex-wrap gap-3 mb-4 text-sm"></div>

    <!-- Calendar -->
    <div class="bg-white rounded-xl shadow-md p-4">
        <div id="calendar"></div>
    </div>
</div>

<!-- Slot Modal -->
<div id="slot-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 id="modal-title" class="text-xl font-bold text-gray-800">Add Availability</h2>
            <button onclick="closeSlotModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>

        <div class="space-y-4">
            <input type="hidden" id="slotId">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Session Type</label>
                <select id="sessionTypeSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Date</label>
                    <input type="date" id="slotDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Max Bookings</label>
                    <input type="number" id="maxBookings" value="1" min="1" max="20"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Start Time</label>
                    <input type="time" id="slotStartTime" step="1800"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">End Time</label>
                    <input type="time" id="slotEndTime" step="1800"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Recurrence</label>
                <select id="recurrence" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
                    <option value="none">One-time</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-weekly</option>
                </select>
            </div>

            <div id="recurrenceEndContainer" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Recurrence End Date</label>
                <input type="date" id="recurrenceEndDate"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Notes (optional)</label>
                <textarea id="slotNotes" rows="2"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-sm resize-none"></textarea>
            </div>
        </div>

        <div class="flex gap-3 mt-6">
            <button id="delete-slot-btn" onclick="deleteSlot()" style="display:none"
                    class="px-4 py-2.5 bg-red-50 text-red-600 border border-red-200 rounded-xl font-semibold text-sm hover:bg-red-100 transition">
                Delete
            </button>
            <button onclick="closeSlotModal()"
                    class="flex-1 py-2.5 border border-gray-300 rounded-xl font-semibold text-sm hover:bg-gray-50 transition">
                Cancel
            </button>
            <button onclick="saveSlot()"
                    class="flex-1 py-2.5 bg-secondary text-gray-900 rounded-xl font-bold text-sm hover:bg-[#b8e000] hover:scale-[1.02] active:scale-100 transition-all duration-150">
                Save
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>
<script>
const Calendar = tui.Calendar;
let calendar;
let sessionTypes = [];

document.addEventListener('DOMContentLoaded', function () {
    loadSessionTypes().then(() => {
        initCalendar();
        loadAvailability();
    });

    document.getElementById('recurrence').addEventListener('change', function () {
        document.getElementById('recurrenceEndContainer').classList.toggle('hidden', this.value === 'none');
    });
});

async function loadSessionTypes() {
    try {
        const resp = await fetch('/api/bookings/session-types/');
        sessionTypes = await resp.json();

        const legend = document.getElementById('session-types-legend');
        legend.innerHTML = sessionTypes.map(st => `
            <span class="flex items-center gap-1.5">
                <span style="background:${st.color}" class="inline-block w-3 h-3 rounded"></span>
                <span class="text-gray-600">${st.name}</span>
            </span>
        `).join('');

        const sel = document.getElementById('sessionTypeSelect');
        sel.innerHTML = sessionTypes.map(st =>
            `<option value="${st.id}">${st.name} (${st.duration_minutes}min — $${st.price})</option>`
        ).join('');
    } catch (e) {
        console.error('Error loading session types:', e);
    }
}

function initCalendar() {
    const calendars = sessionTypes.map(st => ({
        id: String(st.id),
        name: st.name,
        backgroundColor: st.color,
        borderColor: st.color,
    }));

    calendar = new Calendar('#calendar', {
        defaultView: 'week',
        usageStatistics: false,
        isReadOnly: false,
        useDetailPopup: false,
        useFormPopup: false,
        calendars,
        week: { startDayOfWeek: 1, hourStart: 6, hourEnd: 22, taskView: false, eventView: ['time'] },
        month: { startDayOfWeek: 1 },
        template: { time: e => `<span style="color:white">${e.title}</span>` },
    });

    updateCalendarTitle();

    calendar.on('selectDateTime', info => { openCreateSlotModal(info.start, info.end); calendar.clearGridSelections(); });
    calendar.on('clickEvent', info => openEditSlotModal(info.event));
    calendar.on('beforeUpdateEvent', async ({ event, changes }) => updateSlot(event.id, changes));
}

function updateCalendarTitle() {
    const d = calendar.getDate().toDate();
    document.getElementById('calendar-title').textContent =
        d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
}

function changeView(view) {
    calendar.changeView(view);
    updateCalendarTitle();
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('bg-gray-100', 'font-semibold'));
    document.getElementById('btn-' + view).classList.add('bg-gray-100', 'font-semibold');
}

async function loadAvailability() {
    const date = calendar.getDate().toDate();
    const start = new Date(date); start.setDate(start.getDate() - 30);
    const end = new Date(date); end.setDate(end.getDate() + 60);
    try {
        const resp = await fetch(`/api/bookings/availability/?start=${start.toISOString().split('T')[0]}&end=${end.toISOString().split('T')[0]}`);
        const events = await resp.json();
        calendar.clear();
        events.forEach(e => calendar.createEvents([e]));
    } catch (e) { console.error('Error loading availability:', e); }
}

function openCreateSlotModal(start, end) {
    document.getElementById('modal-title').textContent = 'Add Availability';
    document.getElementById('slotId').value = '';
    document.getElementById('delete-slot-btn').style.display = 'none';
    document.getElementById('slotDate').value = start ? start.toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
    document.getElementById('slotStartTime').value = start ? start.toTimeString().slice(0, 5) : '09:00';
    document.getElementById('slotEndTime').value = end ? end.toTimeString().slice(0, 5) : '10:00';
    document.getElementById('maxBookings').value = 1;
    document.getElementById('recurrence').value = 'none';
    document.getElementById('recurrenceEndContainer').classList.add('hidden');
    document.getElementById('slotNotes').value = '';
    document.getElementById('slot-modal').classList.remove('hidden');
}

function openEditSlotModal(event) {
    document.getElementById('modal-title').textContent = 'Edit Availability';
    document.getElementById('slotId').value = event.id;
    document.getElementById('delete-slot-btn').style.display = '';
    const s = new Date(event.start.d.d), e = new Date(event.end.d.d);
    document.getElementById('slotDate').value = s.toISOString().split('T')[0];
    document.getElementById('slotStartTime').value = s.toTimeString().slice(0, 5);
    document.getElementById('slotEndTime').value = e.toTimeString().slice(0, 5);
    document.getElementById('sessionTypeSelect').value = event.calendarId;
    document.getElementById('maxBookings').value = event.raw?.max_bookings || 1;
    document.getElementById('slotNotes').value = event.raw?.notes || '';
    document.getElementById('slot-modal').classList.remove('hidden');
}

function closeSlotModal() { document.getElementById('slot-modal').classList.add('hidden'); }

document.getElementById('slot-modal').addEventListener('click', function (e) { if (e.target === this) closeSlotModal(); });

async function saveSlot() {
    const slotId = document.getElementById('slotId').value;
    const date = document.getElementById('slotDate').value;
    const startTime = document.getElementById('slotStartTime').value;
    const endTime = document.getElementById('slotEndTime').value;
    const data = {
        calendarId: document.getElementById('sessionTypeSelect').value,
        start: `${date}T${startTime}:00`,
        end: `${date}T${endTime}:00`,
        max_bookings: parseInt(document.getElementById('maxBookings').value),
        recurrence: document.getElementById('recurrence').value,
        recurrence_end_date: document.getElementById('recurrenceEndDate').value || null,
        notes: document.getElementById('slotNotes').value,
    };
    try {
        const url = slotId ? `/api/bookings/availability/${slotId}/` : '/api/bookings/availability/';
        const resp = await fetch(url, {
            method: slotId ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify(data),
        });
        const result = await resp.json();
        if (resp.ok) { closeSlotModal(); loadAvailability(); }
        else alert(result.error || 'Error saving slot');
    } catch (e) { console.error(e); alert('Error saving slot'); }
}

async function updateSlot(slotId, changes) {
    try {
        const resp = await fetch(`/api/bookings/availability/${slotId}/`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify(changes),
        });
        if (!resp.ok) { const r = await resp.json(); alert(r.error || 'Error'); loadAvailability(); }
    } catch (e) { loadAvailability(); }
}

async function deleteSlot() {
    const slotId = document.getElementById('slotId').value;
    if (!slotId || !confirm('Delete this availability slot?')) return;
    try {
        const resp = await fetch(`/api/bookings/availability/${slotId}/`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
        });
        if (resp.ok) { closeSlotModal(); loadAvailability(); }
        else { const r = await resp.json(); alert(r.error || 'Error'); }
    } catch (e) { alert('Error deleting slot'); }
}

function getCookie(name) {
    return (document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)')?.pop()) || '';
}
</script>
{% endblock %}
