{% extends 'owner/base.html' %}
{% block title %}Edit Session Type{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'owner_session_types' %}" class="text-owner hover:underline">&larr; Back to Session Types</a>
</div>

<div class="bg-white rounded-xl shadow-md p-8 max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Session Type</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Name *</label>
                <input type="text" name="name" value="{{ session_type.name }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Format *</label>
                <select name="session_format" id="session_format" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner" onchange="toggleClinicFields()">
                    {% for value, label in format_choices %}
                    <option value="{{ value }}" {% if session_type.session_format == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Duration (min)</label>
                <input type="number" name="duration_minutes" value="{{ session_type.duration_minutes }}" min="15"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Price ($) *</label>
                <input type="number" name="price" value="{{ session_type.price }}" step="0.01" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Max Participants</label>
                <input type="number" name="max_participants" value="{{ session_type.max_participants }}" min="1"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Calendar Color</label>
                <input type="color" name="color" value="{{ session_type.color }}"
                       class="w-full h-12 border border-gray-300 rounded-lg cursor-pointer">
            </div>

            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">{{ session_type.description }}</textarea>
            </div>

            <!-- Clinic/Camp Fields -->
            <div id="clinic_fields" class="col-span-2 space-y-4 border-t pt-4 mt-2 {% if session_type.session_format != 'clinic' %}hidden{% endif %}">
                <h3 class="text-sm font-semibold text-purple-700">Clinic/Camp Settings</h3>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                        <input type="date" name="start_date" value="{{ session_type.start_date|date:'Y-m-d' }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                        <input type="date" name="end_date" value="{{ session_type.end_date|date:'Y-m-d' }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Min Age</label>
                        <input type="number" name="min_age" value="{{ session_type.min_age|default:'' }}" min="4" max="99"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner"
                               placeholder="Leave blank for no restriction">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Max Age</label>
                        <input type="number" name="max_age" value="{{ session_type.max_age|default:'' }}" min="4" max="99"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner"
                               placeholder="Leave blank for no restriction">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                    <input type="text" name="location" value="{{ session_type.location }}"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-owner focus:border-owner"
                           placeholder="Field location">
                </div>
            </div>

            <div class="col-span-2">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" name="is_active" {% if session_type.is_active %}checked{% endif %}
                           class="w-5 h-5 text-owner border-gray-300 rounded focus:ring-owner">
                    <span class="text-sm text-gray-700">Active (available for booking)</span>
                </label>
            </div>
        </div>

        <div class="flex space-x-4 pt-4">
            <button type="submit" class="px-6 py-3 bg-owner text-white rounded-lg font-semibold hover:bg-indigo-600 transition">
                Update Session Type
            </button>
            <a href="{% url 'owner_session_types' %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition">Cancel</a>
        </div>
    </form>
</div>

<script>
function toggleClinicFields() {
    const format = document.getElementById('session_format').value;
    const clinicFields = document.getElementById('clinic_fields');
    if (format === 'clinic') {
        clinicFields.classList.remove('hidden');
    } else {
        clinicFields.classList.add('hidden');
    }
}
</script>
{% endblock %}
